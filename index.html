<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<div class="calculator-wrapper">
    <div class="theme-switcher">
        <label for="theme">Theme:</label>
        <select id="theme">
            <option value="blue">🌊 Blue</option>
            <option value="dark">🌙 Dark</option>
            <option value="purple">💜 Purple Neon</option>
            <option value="sunset">🌅 Sunset</option>
        </select>
    </div>

    <div class="calculator">
            <input type="text" id="display" placeholder="0" disabled>
    <div id="preview"></div>

    <div class="buttons">
        <button data-action="clear">C</button>
        <button data-action="delete">DEL</button>
        <button data-value="/">÷</button>
        <button data-value="*">&times;</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="-">&minus;</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="+">+</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-action="calculate" class="equal">=</button>

        <button data-value="0" class="zero">0</button>
        <button data-value=".">.</button>
    </div>
    </div>
    <div id="history" class="history-panel">
        <!-- History items will appear here -->
    </div>
</div>

<!-- Optional toggle button -->
<button id="history-toggle">🕘 History</button>

<script src="script.js"></script>
</body>
</html>
